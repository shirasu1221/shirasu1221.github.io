<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Visualizer Pro - Kawaii Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 全体に可愛いフォントを適用 */
        * { font-family: 'M PLUS Rounded 1c', sans-serif; }

        html, body { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            background: #000;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 5; 
            cursor: pointer; 
        }
        
        #recTimer {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            font-size: clamp(24px, 5vw, 40px); font-weight: 700; color: #ff85a2; z-index: 20;
            text-shadow: 0 0 15px rgba(0,0,0,0.8); pointer-events: none; opacity: 0; transition: 0.3s;
        }
        #recTimer.active { opacity: 1; }

        #uiPanel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 380px; z-index: 15;
            background: rgba(20, 20, 20, 0.92); padding: 25px; border-radius: 30px;
            border: 2px solid #ff85a2; text-align: center; max-height: 80vh; overflow-y: auto; box-sizing: border-box;
            box-shadow: 0 0 30px rgba(255, 133, 162, 0.2);
        }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        /* ボタンのデザインをより丸く可愛く */
        .btn { cursor: pointer; padding: 12px; border: none; border-radius: 20px; font-weight: 700; width: 100%; margin-top: 10px; font-size: 14px; transition: 0.3s; }
        .btn-primary { background: #ff85a2; color: #fff; }
        .btn-play { background: #7ae582; color: #fff; }
        .btn-rec { background: #ff5c8a; color: #fff; }
        .btn:active { transform: scale(0.95); }
        
        .recording { animation: pulse 1.5s infinite; background: #e63946 !important; }
        
        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; text-align: left; }
        label { font-size: 13px; color: #ffc2d1; min-width: 60px; font-weight: 700; }
        input, select { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 12px; flex: 1; min-width: 0; text-align: center; }
        
        .rec-range { background: rgba(255, 133, 162, 0.1); padding: 15px; border-radius: 20px; border: 1.5px dashed #ff85a2; margin: 15px 0; }
        #fileList { margin: 10px 0; max-height: 80px; overflow-y: auto; background: #222; border-radius: 12px; }
        .file-item { padding: 8px 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 12px; align-items: center; }
        .select-btn { color:#ff85a2; background:none; border:1.5px solid #ff85a2; padding:3px 10px; cursor:pointer; border-radius:15px; font-weight: 700; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div id="recTimer">REC 00:00</div>
<canvas id="visualizer"></canvas>

<div id="uiPanel">
    <div id="initSection">
        <button id="startBtn" class="btn btn-primary">はじめる！</button>
    </div>
    <div id="mainControls" class="hidden">
        <div class="control-row">
            <label>モード</label>
            <select id="modeSelect">
                <option value="circle">円形</option>
                <option value="solid_rect">四角</option>
                <option value="horizontal">横</option>
                <option value="vertical">縦</option>
            </select>
        </div>
        <input type="file" id="audioInput" multiple accept=".mp3,.wav,.m4a" style="display:none;">
        <button class="btn" style="background:#444; color:#fff;" onclick="document.getElementById('audioInput').click()">＋ 曲を追加</button>
        <div id="fileList"></div>
        <button id="playBtn" class="btn btn-play">再生 / 停止</button>
        <div class="rec-range">
            <div style="font-size: 12px; color: #ff85a2; margin-bottom: 8px; font-weight: 700;">録画する範囲</div>
            <div class="control-row">
                <label>スタート</label>
                <input type="number" id="startTime" value="0" step="0.5">
                <label style="min-width:30px; text-align:right;">〜</label>
                <input type="number" id="endTime" value="10" step="0.5">
            </div>
            <button id="rangeRecBtn" class="btn btn-rec">この範囲を録画する</button>
        </div>
        <button class="btn" style="background:#222; color:#888;" onclick="toggleUI()">UIをとじる</button>
    </div>
</div>

<script>
    /* JavaScriptロジックは前回と同じ（安定版）を維持 */
    let audioCtx, analyzer, source, destStream;
    let mediaRecorder, recordedChunks = [];
    let currentBuffer = null;
    let isPlaying = false, isRecording = false, timerInterval = null;
    const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d'), timerDisplay = document.getElementById('recTimer');
    const bgImg = new Image();
    bgImg.crossOrigin = "anonymous";
    bgImg.src = 'https://raw.githubusercontent.com/shirasu1221/shirasu1221.github.io/main/IMG_0518.jpeg';

    let initialWidth = window.innerWidth, initialHeight = window.innerHeight;
    function resizeCanvas() {
        if (Math.abs(window.innerWidth - initialWidth) > 100) { initialWidth = window.innerWidth; initialHeight = window.innerHeight; }
        canvas.width = initialWidth; canvas.height = initialHeight;
    }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    function toggleUI() { document.getElementById('uiPanel').classList.toggle('hidden'); }
    canvas.onclick = () => { document.getElementById('uiPanel').classList.remove('hidden'); };

    document.getElementById('startBtn').onclick = async function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyzer = audioCtx.createAnalyser(); analyzer.fftSize = 1024; analyzer.smoothingTimeConstant = 0.8;
        destStream = audioCtx.createMediaStreamDestination();
        document.getElementById('initSection').classList.add('hidden');
        document.getElementById('mainControls').classList.remove('hidden');
        draw();
    };

    document.getElementById('audioInput').onchange = async function(e) {
        const files = Array.from(e.target.files);
        for(let f of files) {
            const buffer = await audioCtx.decodeAudioData(await f.arrayBuffer());
            const index = (window.loadedFiles || []).length;
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${f.name.slice(0,12)}</span><button class="select-btn" onclick="selectFile(${index})">選ぶ</button>`;
            document.getElementById('fileList').appendChild(div);
            window.loadedFiles = (window.loadedFiles || []).concat({ buffer: buffer });
        }
    };

    function selectFile(index) { currentBuffer = window.loadedFiles[index].buffer; playAudio(0); }
    function playAudio(offset) {
        if(source) { try { source.stop(); } catch(e){} }
        if(!currentBuffer) return;
        source = audioCtx.createBufferSource(); source.buffer = currentBuffer;
        source.connect(analyzer); analyzer.connect(audioCtx.destination); analyzer.connect(destStream);
        source.start(0, offset); isPlaying = true;
    }

    document.getElementById('playBtn').onclick = () => {
        if (isPlaying) { if(source) source.stop(); isPlaying = false; }
        else { playAudio(0); }
    };

    function startTimer(start, end) {
        timerDisplay.classList.add('active'); let current = start;
        timerInterval = setInterval(() => {
            current += 0.1; timerDisplay.textContent = `REC ${current.toFixed(1)}s / ${end}s`;
            if (current >= end) stopRec();
        }, 100);
    }

    document.getElementById('rangeRecBtn').onclick = function() {
        if (isRecording) { stopRec(); return; }
        if (!currentBuffer) return;
        const start = parseFloat(document.getElementById('startTime').value) || 0;
        const end = parseFloat(document.getElementById('endTime').value) || 0;
        recordedChunks = [];
        const stream = new MediaStream([...canvas.captureStream(60).getVideoTracks(), ...destStream.stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: "video/webm" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = "viz_rec.webm"; a.click();
        };
        playAudio(start); mediaRecorder.start(); isRecording = true;
        this.classList.add('recording'); this.textContent = "録画を止める"; startTimer(start, end);
    };

    function stopRec() {
        if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        if (source) source.stop(); if (timerInterval) clearInterval(timerInterval);
        isRecording = false; isPlaying = false; timerDisplay.classList.remove('active');
        const btn = document.getElementById('rangeRecBtn'); btn.classList.remove('recording'); btn.textContent = "この範囲を録画する";
    }

    function draw() {
        requestAnimationFrame(draw); if(!analyzer) return;
        const imgAspect = bgImg.width / bgImg.height, canvasAspect = canvas.width / canvas.height;
        let drawW, drawH, offsetX, offsetY;
        if (canvasAspect > imgAspect) { drawW = canvas.width; drawH = canvas.width / imgAspect; offsetX = 0; offsetY = (canvas.height - drawH) / 2; }
        else { drawW = canvas.height * imgAspect; drawH = canvas.height; offsetX = (canvas.width - drawW) / 2; offsetY = 0; }
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.drawImage(bgImg, offsetX, offsetY, drawW, drawH);
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const rawData = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteFrequencyData(rawData);
        const mode = document.getElementById('modeSelect').value;

        if (mode === 'circle') {
            const cx = canvas.width * 0.25, cy = canvas.height * 0.25, r = 80;
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.strokeStyle = "rgba(0, 0, 0, 0.8)"; ctx.lineWidth = 4; ctx.stroke();
            for (let i = 0; i < 180; i++) {
                const val = rawData[Math.floor(Math.pow((i % 90) / 90, 1.2) * 200)];
                const h = Math.pow(val / 255, 1.5) * 80;
                const rad = i * (Math.PI * 2 / 180);
                ctx.strokeStyle = `hsla(${(i/180)*360}, 95%, 70%, 0.9)`;
                ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.beginPath();
                ctx.moveTo(cx + Math.cos(rad)*r, cy + Math.sin(rad)*r); ctx.lineTo(cx + Math.cos(rad)*(r+h), cy + Math.sin(rad)*(r+h)); ctx.stroke();
            }
        } else if (mode === 'solid_rect') {
            const bars = 80, bw = canvas.width / bars;
            for (let i = 0; i < bars; i++) {
                const val = rawData[Math.floor(Math.pow(i / bars, 1.5) * (rawData.length / 2))];
                const h = (val / 255) * (canvas.height * 0.7);
                ctx.fillStyle = `hsla(${(i/bars)*360}, 90%, 60%, 0.85)`;
                ctx.fillRect(i * bw, canvas.height - h, bw - 1, h);
            }
        } else if (mode === 'horizontal' || mode === 'vertical') {
            const bars = 100; const isH = mode === 'horizontal';
            const unit = (isH ? canvas.width : canvas.height) / bars; const base = 90;
            for (let i = 0; i < bars; i++) {
                const val = rawData[Math.floor(Math.pow(i/bars, 1.5) * 250)];
                const h = Math.pow(val / 255, 1.5) * 130;
                ctx.strokeStyle = `hsla(${(i/bars)*360}, 90%, 65%, 0.95)`;
                ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.beginPath();
                if(isH) { ctx.moveTo(i*unit, base-h); ctx.lineTo(i*unit, base+h); }
                else { ctx.moveTo(base-h, i*unit); ctx.lineTo(base+h, i*unit); }
                ctx.stroke();
            }
        }
    }
</script>
</body>
</html>
